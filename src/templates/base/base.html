<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organización Empresarial - Gestor Documental</title>
    
    <!-- Diseño Estructural Integrado (100% Offline) -->
    <style>
        body { background-color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; color: #1e293b; }
        .navbar-custom { background-color: #0f172a; color: #ffffff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .navbar-brand { font-weight: 700; font-size: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
        .user-badge { background-color: #1e293b; padding: 0.5rem 1rem; border-radius: 0.375rem; font-size: 0.875rem; border: 1px solid #334155; color: #38bdf8; font-family: monospace; }
        .app-container { display: flex; min-height: calc(100vh - 70px); }
        .sidebar { background-color: #1e293b; width: 240px; padding: 1.5rem 1rem; flex-shrink: 0; box-shadow: 2px 0 8px rgba(0,0,0,0.05); }
        .sidebar-title { font-size: 0.75rem; text-transform: uppercase; color: #64748b; font-weight: 700; letter-spacing: 0.05em; margin: 1.5rem 0 0.5rem 0.75rem; }
        .sidebar-title:first-child { margin-top: 0; }
        .nav-link-local { color: #cbd5e1; text-decoration: none; display: flex; align-items: center; gap: 0.75rem; padding: 0.625rem 0.75rem; margin-bottom: 0.25rem; border-radius: 0.375rem; font-size: 0.925rem; font-weight: 500; transition: background-color 0.2s, color 0.2s; }
        .nav-link-local:hover { background-color: #334155; color: #ffffff; }
        .main-workspace { flex-grow: 1; padding: 2rem; max-width: 1200px; }
    </style>
</head>
<body>

    <!-- Barra de Navegación Superior -->
    <div class="navbar-custom">
        <div class="navbar-brand">
            📁 Sistema de Organización Empresarial
        </div>
        <div>
            <span class="user-badge">
                Usuario: {{ request.user.username|default:"Invitado" }}
            </span>
        </div>
    </div>

    <div class="app-container">
        <!-- Menú Lateral Izquierdo -->
        <div class="sidebar">
            <div class="sidebar-title">Estructura</div>
            <a class="nav-link-local" href="{% url 'jerarquia:arbol' %}">🌳 Jerarquías</a>
            <a class="nav-link-local" href="{% url 'areas:lista' %}">🏢 Áreas</a>

            <div class="sidebar-title">Operaciones</div>
            <a class="nav-link-local" href="{% url 'personas:lista' %}">👥 Personas</a>
            <a class="nav-link-local" href="{% url 'formularios:lista' %}">📋 Formularios</a>
            <a class="nav-link-local" href="{% url 'documentos:lista' %}">📄 Documentos</a>
        </div>

        <!-- Panel Central Dinámico -->
        <div class="main-workspace">
            {% if messages %}
                {% for message in messages %}
                    <div style="padding: 1rem; background: #eff6ff; color: #1d4ed8; border-left: 4px solid #3b82f6; border-radius: 0.375rem; margin-bottom: 1.5rem;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            {% block content %} {% endblock %}
        </div>
    </div>

</body>
</html>
