{% extends 'base/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-secondary text-white fw-bold p-3">
                <i class="bi bi-file-earmark-plus-fill me-2"></i>Estandarizar Nueva Plantilla de Proceso
            </div>
            <div class="card-body bg-white p-4">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_nombre_formulario" class="form-label fw-bold text-secondary">Nombre descriptivo del Formulario</label>
                        <input type="text" name="nombre_formulario" id="id_nombre_formulario" class="form-control" placeholder="Ej: Formulario de Administración tipo Memo" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="id_tipo_documento" class="form-label fw-bold text-secondary">Tipo de Documento Asociado</label>
                            <select name="tipo_documento" id="id_tipo_documento" class="form-select" required>
                                <option value="" selected disabled>-- Tipo --</option>
                                {% for val, label in form.fields.tipo_documento.choices %}
                                    {% if val %}<option value="{{ val }}">{{ label }}</option>{% endif %}
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="id_area_propietaria" class="form-label fw-bold text-secondary">Área Emisora / Dueña</label>
                            <select name="area_propietaria" id="id_area_propietaria" class="form-select" required>
                                <option value="" selected disabled>-- Seleccionar Área --</option>
                                {% for choice in form.area_propietaria.field.queryset %}
                                    <option value="{{ choice.id }}">{{ choice.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="id_areas_destinatarias" class="form-label fw-bold text-secondary d-block">
                            <i class="bi bi-arrow-left-right me-1 text-warning"></i> Áreas Destinatarias (Pasarela de Comunicación Oblicua)
                        </label>
                        <span class="text-muted small d-block mb-2">Mantené presionada la tecla <strong>Ctrl</strong> (o Comando en Mac) para tildar múltiples áreas de la estructura simultáneamente.</span>
                        <select name="areas_destinatarias" id="id_areas_destinatarias" class="form-select" style="min-height: 120px;" multiple>
                            {% for choice in form.areas_destinatarias.field.queryset %}
                                <option value="{{ choice.id }}">{{ choice.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <a href="{% url 'formularios:lista' %}" class="btn btn-outline-secondary w-50 fw-bold">Cancelar</a>
                        <button type="submit" class="btn btn-success w-50 fw-bold shadow-sm">Guardar Plantilla</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
